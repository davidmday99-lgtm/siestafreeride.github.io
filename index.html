<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Siesta Free Ride</title>

    <!-- Pacifico font -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-image: url('/assets/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #1f2937;
        }

        /* Light overlay so text is readable */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.2);
            z-index: -1;
        }

        .hero {
            background-image:
                linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
                url('/assets/banner.png');
            background-size: cover;
            background-position: center 80%;
        }

        .cursive-text {
            font-family: 'Pacifico', cursive;
            color: #00b4d8;
            text-shadow:
                -2px -2px 0 #000,
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000;
            white-space: nowrap;
        }

        .phone-number {
            color: #00b4d8;
            font-size: 3rem;
            font-weight: bold;
            text-shadow:
                -1px -1px 0 #000,
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000;
        }

        .glass {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            border-radius: 12px;
        }

        @media (max-width: 768px) {
            .cursive-text {
                font-size: 2.4rem;
            }

            .phone-number {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>

<!-- HEADER -->
<header class="sticky top-0 z-50 bg-white/70 backdrop-blur-md shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img src="/assets/logo.png" class="h-20">
            <span class="cursive-text text-3xl font-bold">Siesta Free Ride</span>
        </div>

        <nav class="hidden md:flex gap-6 items-center">
            <a href="/" class="text-blue-600 font-medium">Home</a>
            <a href="/blog.html">Blog</a>
            <a href="/contact.html" class="bg-blue-600 text-white px-4 py-2 rounded">Book Now</a>
        </nav>

        <button class="md:hidden text-2xl"
            onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
            ☰
        </button>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-white/80 backdrop-blur-md p-4">
        <a href="/" class="block mb-2">Home</a>
        <a href="/blog.html" class="block mb-2">Blog</a>
        <a href="/contact.html" class="block">Book Now</a>
    </div>
</header>

<!-- HERO -->
<section class="hero h-[450px] md:h-[600px] flex items-start justify-center text-white text-center pt-24">
    <div>
        <h1 class="text-4xl md:text-6xl font-bold mb-2">
            Siesta Key's #1 Free Ride — Call Now
        </h1>

        <a href="tel:9416008380" class="phone-number block">
            941-600-8380
        </a>
    </div>
</section>

<!-- SERVICES -->
<section class="max-w-6xl mx-auto px-4 py-16">
    <div class="glass p-8">
        <h2 class="text-3xl font-bold text-center mb-10">Our Services</h2>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="glass p-6">
                <h3 class="font-bold text-xl mb-2">Airport Runs</h3>
                <p>Reliable rides to SRQ and beyond.</p>
            </div>

            <div class="glass p-6">
                <h3 class="font-bold text-xl mb-2">Local Rides</h3>
                <p>Quick trips around Siesta Key.</p>
            </div>

            <div class="glass p-6">
                <h3 class="font-bold text-xl mb-2">Private Charters</h3>
                <p>Book a driver for the whole day.</p>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer class="bg-black/80 text-white py-10">
    <div class="max-w-6xl mx-auto px-4 text-center">
        <p>Siesta Free Ride</p>
        <p>941-600-8380</p>
    </div>
</footer>

</body>
</html>
