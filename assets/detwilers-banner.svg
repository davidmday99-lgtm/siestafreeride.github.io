<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <!-- Black background -->
  <rect x="0" y="0" width="120" height="100" fill="#000"/>
  <!-- Red barn shape -->
  <polygon points="10,45 60,10 110,45" fill="#CC0000"/>
  <rect x="10" y="45" width="100" height="50" fill="#CC0000"/>
  <!-- Barn door -->
  <rect x="40" y="55" width="40" height="40" fill="#8B0000" rx="20" ry="0"/>
  <rect x="40" y="55" width="40" height="40" fill="none" stroke="#fff" stroke-width="1.5" rx="20"/>
  <line x1="60" y1="55" x2="60" y2="95" stroke="#fff" stroke-width="1.5"/>
  <!-- Text -->
  <text x="60" y="35" text-anchor="middle" fill="#fff" font-family="Arial Black, sans-serif" font-size="9" font-weight="bold">Detwiler's</text>
  <text x="60" y="80" text-anchor="middle" fill="#fff" font-family="Arial Black, sans-serif" font-size="7" font-weight="bold">FARM</text>
  <text x="60" y="90" text-anchor="middle" fill="#fff" font-family="Arial Black, sans-serif" font-size="7" font-weight="bold">MARKET</text>
</svg>
