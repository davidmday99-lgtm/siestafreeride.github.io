<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>`n        :root { --brand: #0077b6; }
        body { background: #0a0a0a; color: #ffffff; }
        .blog-card {
            background: #121212;
            border: 1px solid #262626;
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 32px;
            transition: border-color 0.2s ease;
        }
        .blog-card:hover {
            border-color: #8FAABC;
        }
        .blog-card .post-date {
            color: #8FAABC;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .blog-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .blog-card h2 a {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .blog-card h2 a:hover {
            color: #8FAABC;
        }
        .blog-card .post-excerpt {
            color: #d2d2d2;
            font-size: 1rem;
            line-height: 1.6;
        }
        @media (max-width: 768px) {
            header img.h-80 { height: 10rem; }
            .blog-card { padding: 16px; }
            .blog-card h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <header class="sticky top-0 z-50 backdrop-blur-md shadow-md" style="background:rgba(184,221,224,0.90);">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">

                <a href="/blog.html" class="hover:text-brand font-medium">Blog</a>
                <a href="/advertise.html" class="hover:text-brand font-medium">Advertise</a>
                <a href="/contact.html" class="bg-brand text-white px-4 py-1.5 rounded-md">Book Now</a>
            </nav>
            <button class="md:hidden text-2xl" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                Menu
            </button>
        </div>
        <div id="mobile-menu" class="md:hidden hidden border-t backdrop-blur-md" style="background:rgba(184,221,224,0.95);">
            <div class="px-4 py-3 space-y-3">
                <a href="/" class="block text-brand font-medium">Home</a>
                <a href="/siesta-key-guide.html" class="block font-medium">Guide</a>
                <a href="/beaches.html" class="block font-medium">Beaches</a>
                <a href="/events.html" class="block font-medium">Events</a>
                <a href="/faq.html" class="block font-medium">FAQ</a>
                <a href="/blog.html" class="block font-medium">Blog</a>
                <a href="/advertise.html" class="block font-medium">Advertise</a>
                <a href="/contact.html" class="block">Book Now</a>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-12">
        <h1 style="color: #ffffff; font-size: 3rem; font-weight: bold; margin-bottom: 1rem; text-align: center;">Siesta Key Daily Reports &amp; Local Guide</h1>
        <p style="text-align: center; color: #999999; margin-bottom: 3rem;">Click a title below to open each article.</p>
        <div id="blog-container"></div>
    </main>

    <footer class="bg-gray-900 text-gray-200 py-8 mt-12">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p>&copy; <span id="yr"></span> Siesta Free Ride. <a href="/" class="text-accent">Home</a></p>
        </div>
    </footer>

    <script>
        document.getElementById('yr').textContent = new Date().getFullYear();
        
        var posts = [
            { date: '2026-05-05', title: 'Sunny Beach Day with 76F Gulf Water - Siesta Key Daily Report', slug: '2026-05-05-daily-blog', excerpt: 'Sunday, May 5: Sunny skies, 69F air, excellent beach conditions with warm 76F water. Perfect for swimming, paddleboarding, and enjoying Siesta Key.' },
            { date: '2026-05-04', title: 'Golden Monday at Siesta Key - Perfect Beach Day', slug: '2026-05-04-daily-blog', excerpt: 'Monday, May 4: 90F sunny skies, gentle breeze. Ideal conditions for beach swimming, paddleboarding, and sunset viewing.' },

            { date: '2026-05-02', title: 'Saturday Weather & Beach Report - May 2, 2026', slug: '2026-05-02-daily-blog', excerpt: 'Saturday brings partly cloudy skies, 87F highs, and perfect Gulf conditions. Ideal for beach activities and water sports.' },
            { date: '2026-05-01', title: 'Friday, May 1 - Beach Weather & Your Guide', slug: '2026-05-01-daily-blog', excerpt: 'Friday kicks off the long weekend with sunny skies, 84F, and ideal Gulf conditions. Perfect for beach swimming and paddleboarding.' },
            { date: '2026-04-30', title: 'Beautiful Tuesday Weather at Siesta Key', slug: '2026-04-30-daily-blog', excerpt: 'Tuesday brings brilliant sunshine, 85F highs, and perfect 78-80F Gulf water. Ideal for swimming and beach days.' },
            { date: '2026-04-29', title: 'Perfect Spring Day at Siesta Key', slug: '2026-04-29-daily-blog', excerpt: 'Monday brings brilliant sunshine, 88F highs, and a warm 75F Gulf. Perfect for swimming and paddleboarding.' },
            { date: '2026-04-28', title: 'Sunny Tuesday with Extreme UV', slug: '2026-04-28-daily-blog', excerpt: 'Tuesday brings crystal-clear skies, 92F highs, and perfect Gulf conditions at 78-80F. Ideal for swimming.' },
            { date: '2026-04-27', title: 'Perfect Beach Day Ahead - Monday Weather', slug: '2026-04-27-daily-blog', excerpt: 'Monday brings sunny skies, 82F highs, and perfect beach conditions to Siesta Key.' },
            { date: '2026-04-26', title: 'Sunday Beach Forecast - April 26, 2026', slug: '2026-04-26-daily-blog', excerpt: 'Sunday weather report with beach conditions, water temperature, and local event information.' },
            { date: '2026-04-25', title: 'Friday Weather & Beach Conditions', slug: '2026-04-25-daily-blog', excerpt: 'Friday brings great beach weather with sunny skies and warm Gulf water.' },
            { date: '2026-04-24', title: 'Daily Update - April 24, 2026', slug: '2026-04-24-daily-blog', excerpt: 'Friday, April 24: sunny and warm at 78F, high of 89F. Weekend beach plans and local tips.' },
            { date: '2026-04-23', title: 'Thursday Beach Report', slug: '2026-04-23-daily-blog', excerpt: 'Thursday weather update with beach and water conditions.' },
            { date: '2026-04-22', title: 'Wednesday Weather Update', slug: '2026-04-22-daily-blog', excerpt: 'Wednesday beach forecast with current conditions.' },
            { date: '2026-04-21', title: 'Tuesday Beach Conditions', slug: '2026-04-21-daily-blog', excerpt: 'Tuesday weather and beach report for Siesta Key.' },
            { date: '2026-04-20', title: 'Monday Forecast', slug: '2026-04-20-daily-blog', excerpt: 'Monday beach weather and conditions for Siesta Key.' },

            { date: '2026-04-18', title: 'Saturday Weather', slug: '2026-04-18-daily-blog', excerpt: 'Saturday beach forecast for Siesta Key.' },

            { date: '2026-04-16', title: 'Thursday Beach Report', slug: '2026-04-16-daily-blog', excerpt: 'Thursday forecast with water temperature.' },
            { date: '2026-04-15', title: 'Wednesday Conditions', slug: '2026-04-15-daily-blog', excerpt: 'Wednesday weather update.' },

            { date: '2026-04-12', title: 'Sunday Update', slug: '2026-04-12-daily-blog', excerpt: 'Sunday weather and conditions.' },
            { date: '2026-04-11', title: 'Saturday Forecast', slug: '2026-04-11-daily-blog', excerpt: 'Saturday weather report.' },
            { date: '2026-04-10', title: 'Friday Conditions', slug: '2026-04-10-daily-blog', excerpt: 'Friday beach update.' },
            { date: '2026-04-09', title: 'Thursday Report', slug: '2026-04-09-daily-blog', excerpt: 'Thursday weather.' },
            { date: '2026-04-08', title: 'Wednesday Weather', slug: '2026-04-08-daily-blog', excerpt: 'Wednesday forecast.' },
            { date: '2026-04-07', title: 'Daily Update - April 7', slug: '2026-04-07-daily-blog', excerpt: 'Tuesday, April 7: breezy with high of 73F.' },
            { date: '2026-04-04', title: 'Daily Update - April 4', slug: '2026-04-04-daily-blog', excerpt: 'Daily tips from Siesta Free Ride.' },
            { date: '2026-04-03', title: 'Daily Update - April 3', slug: '2026-04-03-daily-blog', excerpt: 'Your daily update from Siesta Free Ride.' }
        ];

        function formatDate(dateStr) {
            var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            var parts = dateStr.split('-');
            var year = parseInt(parts[0]);
            var month = parseInt(parts[1]);
            var day = parseInt(parts[2]);
            return months[month - 1] + ' ' + day + ', ' + year;
        }

        var container = document.getElementById('blog-container');
        var html = '';
        var i;
        for (i = 0; i < posts.length; i++) {
            var post = posts[i];
            var dateStr = formatDate(post.date);
            html += '<article class="blog-card"><div class="post-date">' + dateStr + '</div>';
            html += '<h2><a href="/blog/' + post.slug + '.html">' + post.title + '</a></h2>';
            html += '<p class="post-excerpt">' + post.excerpt + '</p></article>';
        }
        container.innerHTML = html;
    </script>
</body>
</html>
