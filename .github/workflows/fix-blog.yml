name: Repair blog encoding and header

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/fix-blog.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install encoding repair tool
        run: python -m pip install ftfy
      - name: Repair posts and restore header
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          from ftfy import fix_text

          changed = 0
          for path in Path("blog").glob("*.html"):
              original = path.read_text(encoding="utf-8")
              fixed = fix_text(original)
              if fixed != original:
                  path.write_text(fixed, encoding="utf-8", newline="\n")
                  changed += 1

          path = Path("blog.html")
          original = path.read_text(encoding="utf-8")
          fixed = re.sub(
              r'\nheader:before,header:after\{.*?\}\nheader:before\{.*?\}\nheader:after\{.*?\}',
              '',
              original,
              flags=re.S,
          )
          fixed = fixed.replace(
              '@media(max-width:760px){header:before,header:after{width:105px;height:160px;background-size:520px auto;opacity:.9}',
              '@media(max-width:760px){',
          )
          fixed = fixed.replace(
              '\nheader>div,header nav{position:relative;z-index:2}',
              '',
          )
          if fixed != original:
              path.write_text(fixed, encoding="utf-8", newline="\n")
              changed += 1

          print(f"Updated {changed} files")
          PY
      - name: Commit repaired blog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog.html blog/*.html
          if git diff --cached --quiet; then
            echo "No repairs needed"
          else
            git commit -m "Fix blog characters and restore header"
            git push
          fi
